[libdefaults]
    default_realm = EXAMPLE.LOCALHOST
    dns_lookup_realm = false
    dns_lookup_kdc = false
    ticket_lifetime = 24h
    renew_lifetime = 7d
    forwardable = true
    rdns = false
    udp_preference_limit = 1

[realms]
    EXAMPLE.LOCALHOST = {
        kdc = kdc.example.localhost:10088
        admin_server = kdc.example.localhost:10749
    }

[domain_realm]
    .example.localhost = EXAMPLE.LOCALHOST
    example.localhost = EXAMPLE.LOCALHOST

# NOTE: kdc.example.localhost and kafka.example.localhost need to resolve to
# 127.0.0.1 from wherever this file is used. On a systemd-based Linux host
# this happens automatically: systemd's nss-myhostname / systemd-resolved
# treat the entire ".localhost" TLD as loopback per RFC 6761, with no
# /etc/hosts entry or DNS server required. If your host does NOT use systemd
# (e.g. macOS, or a non-systemd Linux distro), you'll still need to add:
#
#   127.0.0.1  kdc.example.localhost kafka.example.localhost
#
# to /etc/hosts as a fallback.
#
# The KDC ports here (10088/10749) match the unprivileged host ports
# published in docker-compose.yml for rootless Podman. If you changed those
# port mappings, update this accordingly.

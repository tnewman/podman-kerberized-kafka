[libdefaults]
    default_realm = EXAMPLE.COM
    dns_lookup_realm = false
    dns_lookup_kdc = false
    ticket_lifetime = 24h
    renew_lifetime = 7d
    forwardable = true
    rdns = false
    udp_preference_limit = 1

[realms]
    EXAMPLE.COM = {
        kdc = kdc.example.com:10088
        admin_server = kdc.example.com:10749
    }

[domain_realm]
    .example.com = EXAMPLE.COM
    example.com = EXAMPLE.COM

# NOTE: kdc.example.com and kafka.example.com must resolve from wherever
# this file is used. If you're connecting from your host machine (outside
# the Podman network), add this to /etc/hosts:
#
#   127.0.0.1  kdc.example.com kafka.example.com
#
# The KDC ports here (10088/10749) match the unprivileged host ports
# published in docker-compose.yml for rootless Podman. If you changed those
# port mappings, update this accordingly.

security.protocol=SASL_PLAINTEXT
sasl.mechanism=GSSAPI
sasl.kerberos.service.name=kafka

# Option A: authenticate with a keytab (non-interactive, good for scripts/apps)
sasl.jaas.config=com.sun.security.auth.module.Krb5LoginModule required \
    useKeyTab=true \
    storeKey=true \
    keyTab="/etc/kafka/secrets/client.keytab" \
    principal="client@EXAMPLE.LOCALHOST";

# Option B: authenticate using an existing ticket cache from `kinit` instead.
# Comment out Option A above and uncomment this block instead:
# sasl.jaas.config=com.sun.security.auth.module.Krb5LoginModule required \
#     useTicketCache=true \
#     doNotPrompt=true;
